name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version-file: web/package.json

      - name: Build
        run: make build
        env:
          GOOS: linux
          GOARCH: amd64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/mediocresync-linux-amd64
            mediocresync.service
